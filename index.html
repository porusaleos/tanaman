<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alleos | Farm Development</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-32">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 px-6 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-green-500 p-2 rounded-xl shadow-lg shadow-green-100">
                    <i class="fas fa-seedling text-white"></i>
                </div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Alleos Green</h1>
            </div>
            <div id="statusInd" class="badge badge-success gap-2 py-3 px-4 text-[10px] font-bold text-white border-none shadow-sm shadow-green-100">ONLINE</div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 py-8">
        
        <section id="home-page" class="page-section">
            <div class="mb-10">
                <h2 class="text-4xl font-black text-slate-800 tracking-tight">Halo, <span id="display-name" class="text-green-600">Alfie</span>!</h2>
                <p class="text-slate-400 font-medium italic mt-1" id="display-address"><i class="fas fa-location-dot text-rose-400 mr-1"></i> Citra Onyx, Batam</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="card bg-white p-6 shadow-sm border border-slate-100 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Kelembapan</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-4xl font-black text-slate-800" id="moistureVal">0</span><span class="text-xs font-bold text-slate-400">%</span>
                    </div>
                </div>
                <div class="card bg-white p-6 shadow-sm border border-slate-100 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2" id="ssidDisplay">WiFi</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-4xl font-black text-slate-800" id="wifiVal">0</span><span class="text-xs font-bold text-slate-400">Mbps</span>
                    </div>
                </div>
            </div>

            <div class="card bg-white border border-slate-100 shadow-sm overflow-hidden rounded-[2.5rem]">
                <div class="p-10 text-center bg-slate-50/50">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Status Pompa</p>
                    <h3 class="text-7xl font-black text-slate-800 tracking-tighter" id="pumpStatus">OFF</h3>
                    <p class="text-[10px] text-slate-400 mt-6 font-bold tracking-widest italic uppercase">Update: <span id="lastTime">--:--</span></p>
                </div>
                <div class="grid grid-cols-2 gap-4 p-6">
                    <button onclick="sendPump('ON')" class="btn btn-lg h-24 bg-emerald-500 hover:bg-emerald-600 border-none text-white rounded-3xl shadow-lg shadow-emerald-100 font-black italic text-xl">START</button>
                    <button onclick="sendPump('OFF')" class="btn btn-lg h-24 bg-rose-500 hover:bg-rose-600 border-none text-white rounded-3xl shadow-lg shadow-rose-100 font-black italic text-xl">STOP</button>
                </div>
            </div>
        </section>

        <section id="profile-page" class="page-section hidden">
            <h2 class="text-3xl font-black text-slate-800 mb-6 text-center">Edit Profil</h2>
            <div class="card bg-white p-8 shadow-sm border border-slate-100 rounded-[2.5rem] space-y-4">
                <input type="text" id="input-name" placeholder="Nama Baru" class="input input-bordered w-full bg-slate-50 border-none rounded-2xl" />
                <input type="text" id="input-address" placeholder="Alamat Baru" class="input input-bordered w-full bg-slate-50 border-none rounded-2xl" />
                <button onclick="saveProfile()" class="btn bg-slate-800 text-white w-full rounded-2xl border-none h-16 font-bold uppercase tracking-widest">Simpan</button>
            </div>
        </section>

        <section id="settings-page" class="page-section hidden">
            <h2 class="text-3xl font-black text-slate-800 mb-6 text-center">WiFi Setting</h2>
            <div id="wifi-alert" class="hidden p-4 mb-4 rounded-2xl text-xs font-bold text-center"></div>
            <div class="card bg-white p-8 shadow-sm border border-slate-100 rounded-[2.5rem] space-y-4">
                <input type="text" id="input-ssid" placeholder="Nama WiFi Baru" class="input input-bordered w-full bg-slate-50 border-none rounded-2xl" />
                <input type="password" id="input-pass" placeholder="Password Baru" class="input input-bordered w-full bg-slate-50 border-none rounded-2xl" />
                <button onclick="saveWifi()" class="btn bg-indigo-600 text-white w-full rounded-2xl border-none h-16 font-bold uppercase tracking-widest">Update WiFi</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-6 right-6 z-50">
        <div class="max-w-md mx-auto bg-white/180 backdrop-blur-xl border border-slate-100 shadow-2xl rounded-full px-10 py-5 flex justify-between items-center">
            <button onclick="showPage('home')" id="nav-home" class="text-green-500 flex flex-col items-center">
                <i class="fas fa-home text-xl"></i><span class="text-[9px] font-black uppercase mt-1">Home</span>
            </button>
            <button onclick="showPage('profile')" id="nav-profile" class="text-slate-400 flex flex-col items-center">
                <i class="fas fa-user-circle text-xl"></i><span class="text-[9px] font-black uppercase mt-1">Profil</span>
            </button>
            <button onclick="showPage('settings')" id="nav-settings" class="text-slate-400 flex flex-col items-center">
                <i class="fas fa-cog text-xl"></i><span class="text-[9px] font-black uppercase mt-1">Setting</span>
            </button>
        </div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "bungabunda-4f817.firebaseapp.com",
            databaseURL: "https://bungabunda-4f817-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bungabunda-4f817",
            storageBucket: "bungabunda-4f817.appspot.com",
            messagingSenderId: "759284092991",
            appId: "1:759284092991:web:..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(p + '-page').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-green-500');
                b.classList.add('text-slate-400');
            });
            document.getElementById('nav-' + p).classList.add('text-green-500');
            document.getElementById('nav-' + p).classList.remove('text-slate-400');
        }

        db.ref('/').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            document.getElementById('moistureVal').innerText = data.moisture || 0;
            document.getElementById('wifiVal').innerText = data.wifiMbps || 0;
            document.getElementById('ssidDisplay').innerText = data.wifiName || "WiFi";
            document.getElementById('pumpStatus').innerText = data.pumpStatus || "OFF";
            document.getElementById('lastTime').innerText = data.lastTime || "--:--";
            document.getElementById('display-name').innerText = data.userName || "Alfie";
            document.getElementById('display-address').innerText = data.userAddress || "Citra Onyx, Batam";

            const pStatus = document.getElementById('pumpStatus');
            pStatus.className = `text-7xl font-black ${data.pumpStatus === 'ON' ? 'text-emerald-500 animate-pulse' : 'text-slate-800'}`;

            // Handle WiFi Alert
            const alertBox = document.getElementById('wifi-alert');
            if (data.wifi_request === "FAILED") {
                alertBox.className = "p-4 mb-4 rounded-2xl text-xs font-bold text-center bg-rose-50 text-rose-600 block";
                alertBox.innerText = data.wifi_status === "NOT_FOUND" ? "WIFI TIDAK DITEMUKAN" : "PASSWORD SALAH";
            } else if (data.wifi_request === "DONE") {
                alertBox.className = "p-4 mb-4 rounded-2xl text-xs font-bold text-center bg-emerald-50 text-emerald-600 block";
                alertBox.innerText = "WIFI TERHUBUNG!";
                setTimeout(() => alertBox.classList.add('hidden'), 5000);
            } else { alertBox.classList.add('hidden'); }
        });

        function sendPump(s) {
            const now = new Date();
            const t = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
            db.ref('/').update({ pumpStatus: s, lastTime: s==="ON"?t:document.getElementById('lastTime').innerText });
        }

        function saveProfile() {
            const n = document.getElementById('input-name').value;
            const a = document.getElementById('input-address').value;
            db.ref('/').update({ userName: n || "Alfie", userAddress: a || "Citra Onyx" });
            alert("Profil diperbarui!");
        }

        function saveWifi() {
            const s = document.getElementById('input-ssid').value;
            const p = document.getElementById('input-pass').value;
            if(s && p) {
                db.ref('/').update({ new_ssid: s, new_pass: p, wifi_request: "UPDATE" });
                alert("Request dikirim!");
            }
        }
    </script>
</body>
</html>
